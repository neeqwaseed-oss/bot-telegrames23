version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: tcgis-postgres
    environment:
      POSTGRES_DB: tcgis
      POSTGRES_USER: tcgis_user
      POSTGRES_PASSWORD: tcgis_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    networks:
      - tcgis-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tcgis_user -d tcgis"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: tcgis-redis
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tcgis-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Elasticsearch
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: tcgis-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - tcgis-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: src/api_gateway/Dockerfile
    container_name: tcgis-api
    ports:
      - "8000:8000"
    environment:
      - ENV=${ENV:-production}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - tcgis-network
    command: uvicorn src.api_gateway.main:app --host 0.0.0.0 --port 8000

  # Bot Engine
  bot-engine:
    build:
      context: .
      dockerfile: src/bot_engine/Dockerfile
    container_name: tcgis-bot
    environment:
      - ENV=${ENV:-production}
      - BOT_TOKEN=${BOT_TOKEN}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tcgis-network

  # Scraper Engine
  scraper-engine:
    build:
      context: .
      dockerfile: src/scraper_engine/Dockerfile
    container_name: tcgis-scraper
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - PROXY_POOL=${PROXY_POOL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tcgis-network

  # Data Processor
  data-processor:
    build:
      context: .
      dockerfile: src/data_processor/Dockerfile
    container_name: tcgis-processor
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - tcgis-network

  # Scheduler
  scheduler:
    build:
      context: .
      dockerfile: src/scheduler/Dockerfile
    container_name: tcgis-scheduler
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tcgis-network

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:

networks:
  tcgis-network:
    driver: bridge
